<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#0d1117"/>
  <rect x="0" y="0" width="800" height="32" fill="#161b22"/>
  <circle cx="16" cy="16" r="5" fill="#ff5f57"/>
  <circle cx="36" cy="16" r="5" fill="#febc2e"/>
  <circle cx="56" cy="16" r="5" fill="#28c840"/>
  <text x="180" y="20" font-family="monospace" font-size="12" fill="#8b949e">IAM Policy Comparison — Before / After</text>
  <text x="20" y="58" font-family="monospace" font-size="11" fill="#8b949e">BEFORE (misconfigured)</text>
  <rect x="20" y="65" width="360" height="140" fill="#2d1b1b" rx="4"/>
  <text x="32" y="85" font-family="monospace" font-size="11" fill="#ff7b72">{</text>
  <text x="32" y="103" font-family="monospace" font-size="11" fill="#ff7b72">  "Effect": "Allow",</text>
  <text x="32" y="121" font-family="monospace" font-size="11" fill="#ff7b72">  "Principal": "*",</text>
  <text x="32" y="139" font-family="monospace" font-size="11" fill="#ff7b72">  "Action": "s3:*",</text>
  <text x="32" y="157" font-family="monospace" font-size="11" fill="#ff7b72">  "Resource": "arn:aws:s3:::target-backup-prod/*"</text>
  <text x="32" y="175" font-family="monospace" font-size="11" fill="#ff7b72">}</text>
  <text x="420" y="58" font-family="monospace" font-size="11" fill="#8b949e">AFTER (remediated)</text>
  <rect x="420" y="65" width="360" height="165" fill="#1b2d1b" rx="4"/>
  <text x="432" y="85" font-family="monospace" font-size="11" fill="#56d364">{</text>
  <text x="432" y="103" font-family="monospace" font-size="11" fill="#56d364">  "Effect": "Allow",</text>
  <text x="432" y="121" font-family="monospace" font-size="11" fill="#56d364">  "Principal": {</text>
  <text x="432" y="139" font-family="monospace" font-size="11" fill="#56d364">    "AWS": "arn:aws:iam::123456789:role/BackupReader"</text>
  <text x="432" y="157" font-family="monospace" font-size="11" fill="#56d364">  },</text>
  <text x="432" y="175" font-family="monospace" font-size="11" fill="#56d364">  "Action": ["s3:GetObject", "s3:ListBucket"],</text>
  <text x="432" y="193" font-family="monospace" font-size="11" fill="#56d364">  "Resource": "arn:aws:s3:::target-backup-prod/*"</text>
  <text x="432" y="211" font-family="monospace" font-size="11" fill="#56d364">}</text>
  <rect x="20" y="230" width="760" height="2" fill="#30363d"/>
  <text x="20" y="260" font-family="monospace" font-size="11" fill="#8b949e">S3 Block Public Access — enabled at account level after remediation</text>
  <rect x="20" y="275" width="200" height="20" fill="#1f3a5a" rx="3"/>
  <text x="28" y="289" font-family="monospace" font-size="11" fill="#79c0ff">BlockPublicAcls: true</text>
  <rect x="230" y="275" width="230" height="20" fill="#1f3a5a" rx="3"/>
  <text x="238" y="289" font-family="monospace" font-size="11" fill="#79c0ff">BlockPublicPolicy: true</text>
  <rect x="470" y="275" width="230" height="20" fill="#1f3a5a" rx="3"/>
  <text x="478" y="289" font-family="monospace" font-size="11" fill="#79c0ff">RestrictPublicBuckets: true</text>
</svg>
