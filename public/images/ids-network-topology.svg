<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <rect width="800" height="420" fill="#0d1117"/>
  <text x="340" y="28" font-family="sans-serif" font-size="14" font-weight="bold" fill="#e6edf3">Homelab IDS Network Topology</text>
  <!-- Internet -->
  <rect x="340" y="50" width="120" height="36" rx="6" fill="#1f2937" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="73" text-anchor="middle" font-family="monospace" font-size="12" fill="#8b949e">Internet</text>
  <!-- Line down -->
  <line x1="400" y1="86" x2="400" y2="120" stroke="#30363d" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- Router/Firewall -->
  <rect x="310" y="120" width="180" height="40" rx="6" fill="#161b22" stroke="#79c0ff" stroke-width="1.5"/>
  <text x="400" y="145" text-anchor="middle" font-family="monospace" font-size="12" fill="#79c0ff">pfSense Firewall</text>
  <!-- Lines to switch and span -->
  <line x1="400" y1="160" x2="400" y2="185" stroke="#30363d" stroke-width="1.5"/>
  <!-- Switch -->
  <rect x="310" y="185" width="180" height="40" rx="6" fill="#161b22" stroke="#56d364" stroke-width="1.5"/>
  <text x="400" y="210" text-anchor="middle" font-family="monospace" font-size="12" fill="#56d364">Managed Switch (SPAN)</text>
  <!-- Lines from switch -->
  <line x1="310" y1="205" x2="180" y2="255" stroke="#30363d" stroke-width="1.5"/>
  <line x1="400" y1="225" x2="400" y2="255" stroke="#30363d" stroke-width="1.5"/>
  <line x1="490" y1="205" x2="620" y2="255" stroke="#30363d" stroke-width="1.5"/>
  <line x1="350" y1="205" x2="200" y2="320" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3"/>
  <!-- IDS Sensor -->
  <rect x="100" y="255" width="160" height="40" rx="6" fill="#1a2436" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="180" y="280" text-anchor="middle" font-family="monospace" font-size="11" fill="#f59e0b">Suricata IDS Sensor</text>
  <!-- LAN hosts -->
  <rect x="330" y="255" width="140" height="40" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="280" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">LAN Hosts / IoT</text>
  <!-- NAS -->
  <rect x="545" y="255" width="140" height="40" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="615" y="280" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">NAS / Servers</text>
  <!-- ELK -->
  <rect x="100" y="330" width="160" height="40" rx="6" fill="#1a1a36" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="180" y="355" text-anchor="middle" font-family="monospace" font-size="11" fill="#d2a8ff">ELK Stack (Alerts)</text>
  <line x1="180" y1="295" x2="180" y2="330" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="95" y="230" font-family="monospace" font-size="9" fill="#f59e0b">SPAN mirror</text>
</svg>
