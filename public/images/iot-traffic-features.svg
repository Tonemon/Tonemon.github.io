<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <rect width="800" height="420" fill="#0d1117"/>
  <text x="230" y="30" font-family="sans-serif" font-size="14" font-weight="bold" fill="#e6edf3">Feature Importance — IoT Device Classification</text>
  <!-- Y axis -->
  <line x1="140" y1="50" x2="140" y2="340" stroke="#30363d" stroke-width="1"/>
  <!-- X axis -->
  <line x1="140" y1="340" x2="760" y2="340" stroke="#30363d" stroke-width="1"/>
  <!-- Grid lines -->
  <line x1="140" y1="280" x2="760" y2="280" stroke="#21262d" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="140" y1="220" x2="760" y2="220" stroke="#21262d" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="140" y1="160" x2="760" y2="160" stroke="#21262d" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="140" y1="100" x2="760" y2="100" stroke="#21262d" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- Y labels -->
  <text x="130" y="344" text-anchor="end" font-family="monospace" font-size="10" fill="#8b949e">0%</text>
  <text x="130" y="284" text-anchor="end" font-family="monospace" font-size="10" fill="#8b949e">20%</text>
  <text x="130" y="224" text-anchor="end" font-family="monospace" font-size="10" fill="#8b949e">40%</text>
  <text x="130" y="164" text-anchor="end" font-family="monospace" font-size="10" fill="#8b949e">60%</text>
  <text x="130" y="104" text-anchor="end" font-family="monospace" font-size="10" fill="#8b949e">80%</text>
  <!-- Bars -->
  <!-- Inter-packet timing: 78% -->
  <rect x="160" y="106" width="70" height="234" fill="#79c0ff" rx="2"/>
  <text x="195" y="98" text-anchor="middle" font-family="monospace" font-size="10" fill="#79c0ff">78%</text>
  <text x="195" y="358" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">Inter-packet</text>
  <text x="195" y="370" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">timing</text>
  <!-- Flow duration: 61% -->
  <rect x="260" y="157" width="70" height="183" fill="#56d364" rx="2"/>
  <text x="295" y="149" text-anchor="middle" font-family="monospace" font-size="10" fill="#56d364">61%</text>
  <text x="295" y="358" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">Flow</text>
  <text x="295" y="370" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">duration</text>
  <!-- Packet size variance: 54% -->
  <rect x="360" y="178" width="70" height="162" fill="#d2a8ff" rx="2"/>
  <text x="395" y="170" text-anchor="middle" font-family="monospace" font-size="10" fill="#d2a8ff">54%</text>
  <text x="395" y="358" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">Pkt size</text>
  <text x="395" y="370" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">variance</text>
  <!-- DNS query rate: 47% -->
  <rect x="460" y="199" width="70" height="141" fill="#f59e0b" rx="2"/>
  <text x="495" y="191" text-anchor="middle" font-family="monospace" font-size="10" fill="#f59e0b">47%</text>
  <text x="495" y="358" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">DNS query</text>
  <text x="495" y="370" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">rate</text>
  <!-- Protocol dist: 38% -->
  <rect x="560" y="226" width="70" height="114" fill="#ff7b72" rx="2"/>
  <text x="595" y="218" text-anchor="middle" font-family="monospace" font-size="10" fill="#ff7b72">38%</text>
  <text x="595" y="358" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">Protocol</text>
  <text x="595" y="370" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">dist.</text>
  <!-- Payload entropy: 29% -->
  <rect x="660" y="253" width="70" height="87" fill="#30363d" rx="2"/>
  <text x="695" y="245" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">29%</text>
  <text x="695" y="358" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">Payload</text>
  <text x="695" y="370" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">entropy</text>
</svg>
